<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика задач</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --main-color: #2c3e50;
            --accent-color: #3498db;
            --purple-color: #9b59b6;
            --success-color: #2ecc71;
            --warning-color: #e67e22;
            --danger-color: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .analytics-container {
            max-width: 700px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 {
            color: var(--main-color);
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            background-color: var(--main-color);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn-back:hover {
            background-color: #34495e;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 25px 20px;
            border-radius: 8px;
            border-bottom: 4px solid #bdc3c7;
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-card h3 {
            margin: 0;
            font-size: 14px;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-number {
            font-size: 38px;
            font-weight: bold;
            color: var(--accent-color);
            margin-top: 10px;
        }

        .stat-card.total { border-bottom-color: var(--accent-color); }
        .stat-card.total .stat-number { color: var(--accent-color); }

        .stat-card.success { border-bottom-color: var(--success-color); }
        .stat-card.success .stat-number { color: var(--success-color); }

        .stat-card.efficiency { border-bottom-color: var(--purple-color); }
        .stat-card.efficiency .stat-number { color: var(--purple-color); }

        .stat-card.danger { border-bottom-color: var(--danger-color); }
        .stat-card.danger .stat-number { color: var(--danger-color); }
    </style>
</head>
<body>

<div class="analytics-container">
    <a href="/" class="btn-back">← Назад к списку дел</a>
    <h1>Как идут дела?</h1>
    <div class="subtitle">Считаем выполненные задачи и следим за горящими дедлайнами</div>

    <div class="stat-grid">
        <div class="stat-card total">
            <h3>Всего добавлено</h3>
            <div class="stat-number">{{ total }}</div>
        </div>

        <div class="stat-card success">
            <h3>Успешно сделано</h3>
            <div class="stat-number">{{ completed }}</div>
        </div>

        <div class="stat-card efficiency">
            <h3>Процент успеваемости</h3>
            <div class="stat-number">{{ efficiency }}%</div>
        </div>

        <div class="stat-card danger">
            <h3>Просрочено</h3>
            <div class="stat-number">{{ overdue }}</div>
        </div>
    </div>
</div>

</body>
</html>
